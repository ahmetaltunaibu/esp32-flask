<!DOCTYPE html>
<html>
<head>
    <title>{{ cihaz.cihaz_adi }} Detay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container mt-4">
        <button class="btn btn-secondary" onclick="window.history.back()">← Geri</button>

        <div class="card mb-4">
            <div class="card-header">
                <h2>{{ cihaz.cihaz_adi }}</h2>
            </div>
            <div class="card-body">
                <p><strong>Konum:</strong> {{ cihaz.konum }}</p>
                <p><strong>MAC Adresi:</strong> {{ cihaz.mac }}</p>
                <p><strong>Son Güncelleme:</strong> {{ cihaz.timestamp | datetimeformat }}</p>
            </div>
        </div>

        <h3 class="mb-3">Sensör Verileri</h3>
        <div class="row">
            {% for veri in cihaz.veriler %}
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ veri.sensor_id }}</h5>
                        <canvas id="gauge-{{ loop.index }}"></canvas>
                        <p class="text-center mt-2">
                            <span class="display-6">{{ "%.2f"|format(veri.deger) }}</span>
                            <span class="text-muted">{{ veri.birim }}</span>
                        </p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        {% for veri in cihaz.veriler %}
        (function() {
            const ctx = document.getElementById('gauge-{{ loop.index }}').getContext('2d');
            const value = {{ veri.deger }};
            const max = value * 1.5;

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [value, max - value],
                        backgroundColor: [getColor(value/max*100), '#f8f9fa'],
                        borderWidth: 0
                    }]
                },
                options: {
                    circumference: 180,
                    rotation: 270,
                    cutout: '80%',
                    plugins: { legend: { display: false } },
                    maintainAspectRatio: false
                }
            });

            function getColor(percent) {
                if (percent > 75) return '#dc3545';
                if (percent > 50) return '#ffc107';
                return '#28a745';
            }
        })();
        {% endfor %}

        setTimeout(() => location.reload(), 30000);
    </script>
</body>
</html>
