<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Modbus Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gauge-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .gauge-card:hover {
            transform: translateY(-5px);
        }
        .gauge-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #444;
        }
        .gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }
        .gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }
        .timestamp {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .header p {
            color: #7f8c8d;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-tachometer-alt"></i> Modbus Data Dashboard</h1>
        <p>Real-time monitoring of industrial sensors</p>
    </div>

    <div class="dashboard" id="dashboard">
        <!-- Dinamik olarak gauge'ler buraya eklenecek -->
    </div>

    <script>
        // Gauge oluşturma fonksiyonu
        function createGauge(canvasId, title, value, min, max) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Değeri yüzdeye çevir
            const percentage = ((value - min) / (max - min)) * 100;
            
            return new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [percentage, 100 - percentage],
                        backgroundColor: [
                            getColor(percentage),
                            '#f0f0f0'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    circumference: 180,
                    rotation: 270,
                    cutout: '80%',
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            enabled: false
                        }
                    },
                    animation: {
                        animateScale: true,
                        animateRotate: true
                    }
                }
            });
        }

        // Değere göre renk belirle (yeşil -> sarı -> kırmızı)
        function getColor(percentage) {
            if (percentage > 75) return '#e74c3c';
            if (percentage > 50) return '#f39c12';
            return '#2ecc71';
        }

        // Verileri güncelle
        function updateData() {
            fetch('/get_data')
                .then(response => response.json())
                .then(data => {
                    if (!data) return;
                    
                    document.getElementById('dashboard').innerHTML = '';
                    
                    // Her bir veri için gauge oluştur
                    for (let i = 0; i < 13; i++) {
                        const value = data['data' + i] || 0;
                        const gaugeId = 'gauge-' + i;
                        
                        // Kart HTML'i oluştur
                        const card = document.createElement('div');
                        card.className = 'gauge-card';
                        card.innerHTML = `
                            <div class="gauge-title">Sensor ${i+1}</div>
                            <div class="gauge-container">
                                <canvas id="${gaugeId}" width="200" height="200"></canvas>
                                <div class="gauge-value">${value.toFixed(2)}</div>
                            </div>
                            <div class="timestamp">Last update: ${data.timestamp || 'N/A'}</div>
                        `;
                        
                        document.getElementById('dashboard').appendChild(card);
                        
                        // Gauge'i oluştur (min: 0, max: 100 varsayılan)
                        createGauge(gaugeId, 'Sensor ' + (i+1), value, 0, 100);
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        // Sayfa yüklendiğinde ve her 2 saniyede bir verileri güncelle
        document.addEventListener('DOMContentLoaded', () => {
            updateData();
            setInterval(updateData, 2000);
        });
    </script>
</body>
</html>
